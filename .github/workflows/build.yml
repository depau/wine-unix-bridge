name: Build and Release

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-builder

jobs:
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/386
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-app:
    needs: build-builder
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, x86]
        include:
          - arch: x64
            platform: linux/amd64
          - arch: x86
            platform: linux/386

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$(pwd):/workdir" -w /workdir \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            make -j$(nproc) ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine_unix_bridge-linux-${{ matrix.arch }}
          path: build/${{ matrix.arch }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-app
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts (x64)
        uses: actions/download-artifact@v4
        with:
          name: wine_unix_bridge-linux-x64
          path: build/x64
    
      - name: Download artifacts (x86)
        uses: actions/download-artifact@v4
        with:
          name: wine_unix_bridge-linux-x86
          path: build/x86
    
      - name: Zip artifacts
        run: |
          cd build
          zip -j ../wine_unix_bridge-linux-x64.zip x64/unixbridge.exe x64/unixbridge.dll
          zip -j ../wine_unix_bridge-linux-x86.zip x86/unixbridge.exe x86/unixbridge.dll
    
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wine_unix_bridge-linux-x64.zip
            wine_unix_bridge-linux-x86.zip
          generate_release_notes: true
